<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dearlog v2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Dearlog</h1>
      <p class="subtitle">생성형 학습 · 메타인지 · 칭찬 강화 시스템</p>
    </div>
    <div class="top-actions">
      <button id="exportBtn" class="secondary">데이터 내보내기</button>
      <label class="file-label secondary" for="importInput">데이터 불러오기</label>
      <input type="file" id="importInput" accept="application/json" hidden />
      <button id="resetBtn" class="danger">전체 초기화</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar card">
      <section>
        <h2>오늘의 요약</h2>
        <div id="summaryStats" class="stats-grid"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>과목</h2>
        </div>
        <form id="subjectForm" class="stack compact">
          <input id="subjectName" type="text" placeholder="예: 영어, 창작 영어, 철학" required />
          <input id="subjectColor" type="color" value="#7c9dff" />
          <button type="submit">과목 추가</button>
        </form>
        <div id="subjectList" class="stack mt"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>오늘의 분석</h2>
        </div>
        <div id="analysisBox" class="analysis-box muted"></div>
      </section>
    </aside>

    <section class="main-content">
      <div class="grid two">
        <section class="card">
          <div class="section-head">
            <h2>미션 빌더</h2>
          </div>
          <form id="missionForm" class="stack">
            <select id="missionSubject" required></select>
            <input id="missionTitle" type="text" placeholder="미션 이름" required />
            <textarea id="missionPrompt" rows="3" placeholder="예: 이 문장을 캐릭터 대사로 바꾸기" required></textarea>
            <button type="submit">미션 추가</button>
          </form>
          <div id="missionList" class="stack mt"></div>
        </section>

        <section class="card">
         <div class="section-head">
           <h2>Role Mode</h2>
         </div>

         <select id="roleModeSelect"></select>

         <div id="roleModeBox" class="role-box mt">
            오늘의 역할이 표시됩니다.
         </div>
        </section>

        <section class="card">
          <div class="section-head">
            <h2>칭찬 엔진</h2>
            <div class="chip-row">
              <button id="normalModeBtn" class="chip active" type="button">기본 모드</button>
              <button id="gonadiModeBtn" class="chip" type="button">가나디 모드</button>
            </div>
          </div>
          <div id="praiseBox" class="praise-box">
            시작했다는 것 자체가 이미 성공입니다.
          </div>
          <p class="help muted">세션 저장 시 현재 기록에 맞춘 칭찬이 갱신됩니다.</p>
        </section>
      </div>

      <section class="card">
        <div class="section-head">
          <h2>학습 세션</h2>
        </div>
        <form id="studyForm" class="stack">
          <div class="grid two">
            <div class="stack compact">
              <label>과목</label>
              <select id="studySubject" required></select>
            </div>
            <div class="stack compact">
              <label>미션</label>
              <select id="studyMission"></select>
            </div>
          </div>

          <div class="grid two">
            <div class="stack compact">
              <label>학습 제목</label>
              <input id="studyTitle" type="text" placeholder="예: 영어 본문 3과 구조 분석" required />
            </div>
            <div class="stack compact">
              <label>사용 맥락 태그</label>
              <input id="studyUsage" type="text" placeholder="예: 소설, TRPG, 시험, 세계관" />
            </div>
          </div>

          <label>1) 입력</label>
          <textarea id="studyInput" rows="4" placeholder="본문, 개념, 문제 등 원재료를 적으세요." required></textarea>

          <div class="grid two">
            <div class="stack compact">
              <label>2) 핵심 구조</label>
              <textarea id="studyCore" rows="4" placeholder="핵심 구조, 논리, 개념 뼈대"></textarea>
            </div>
            <div class="stack compact">
              <label>3) 생성 결과</label>
              <textarea id="studyGenerated" rows="4" placeholder="내가 바꾼 문장, 재작성, 새 문제, 설명문"></textarea>
            </div>
          </div>

          <div class="grid two">
            <div class="stack compact">
              <label>4) 검증 결과</label>
              <select id="validationResult">
                <option value="unchecked">아직 안 함</option>
                <option value="correct">맞음</option>
                <option value="partial">부분 정답</option>
                <option value="wrong">틀림</option>
              </select>
            </div>
            <div class="stack compact">
              <label>틀린 이유 / 체크 포인트</label>
              <input id="validationMistake" type="text" placeholder="예: 관계대명사 구조 혼동" />
            </div>
          </div>

          <div class="divider"></div>
          <h3>메타인지</h3>
          <div class="grid three">
            <div class="stack compact">
              <label>시작 전 기분</label>
              <input id="beforeMood" type="range" min="1" max="5" value="3" />
            </div>
            <div class="stack compact">
              <label>예상 집중도</label>
              <input id="beforeFocus" type="range" min="1" max="5" value="3" />
            </div>
            <div class="stack compact">
              <label>시작 장벽</label>
              <input id="beforeBarrier" type="range" min="1" max="5" value="2" />
            </div>
          </div>

          <div class="grid three">
            <div class="stack compact">
              <label>실제 집중도</label>
              <input id="afterFocus" type="range" min="1" max="5" value="3" />
            </div>
            <div class="stack compact">
              <label>실제 이해도</label>
              <input id="afterUnderstanding" type="range" min="1" max="5" value="3" />
            </div>
            <div class="stack compact">
              <label>기억 강도</label>
              <input id="afterMemory" type="range" min="1" max="5" value="3" />
            </div>
          </div>

          <div class="grid two">
            <textarea id="reflectionWorked" rows="3" placeholder="뭐가 잘 먹혔지?"></textarea>
            <textarea id="reflectionImprove" rows="3" placeholder="다음엔 어떻게 바꿀까?"></textarea>
          </div>

          <div class="actions-row">
            <button type="submit">세션 저장</button>
            <button id="clearStudyFormBtn" type="button" class="secondary">폼 비우기</button>
          </div>
        </form>
      </section>

      <div class="grid two">
        <section class="card">
          <div class="section-head">
            <h2>최근 세션</h2>
          </div>
          <div id="recentSessions" class="stack"></div>
        </section>

        <section class="card">
          <div class="section-head">
            <h2>아카이브</h2>
            <input id="archiveSearch" type="search" placeholder="제목, 과목, 태그 검색" />
          </div>
          <div id="archiveList" class="stack"></div>
        </section>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
